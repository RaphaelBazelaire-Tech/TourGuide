name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation du JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Les 3 bibliothèques ne sont pas sur Maven Central : on les installe
      # dans le dépôt Maven local avant toute compilation.
      - name: Installation des dépendances locales
        run: |
          mvn install:install-file -Dfile=libs/gpsUtil.jar -DgroupId=gpsUtil -DartifactId=gpsUtil -Dversion=1.0.0 -Dpackaging=jar
          mvn install:install-file -Dfile=libs/RewardCentral.jar -DgroupId=rewardCentral -DartifactId=rewardCentral -Dversion=1.0.0 -Dpackaging=jar
          mvn install:install-file -Dfile=libs/TripPricer.jar -DgroupId=tripPricer -DartifactId=tripPricer -Dversion=1.0.0 -Dpackaging=jar

      # Étape 1 : compilation
      - name: Compilation
        run: mvn -B clean compile

      # Étape 2 : tests (les tests de performance, tagués "performance",
      # sont exclus du pipeline car trop longs pour un runner CI)
      - name: Tests
        run: mvn -B test -DexcludedGroups=performance

      # Étape 3 : build de l'artefact (jar exécutable Spring Boot)
      - name: Build de l'artéfact
        run: mvn -B package -DskipTests

      # Publication du jar : téléchargeable depuis l'onglet "Actions" du run.
      - name: Publication de l'artéfact
        uses: actions/upload-artifact@v4
        with:
          name: tourguide-jar
          path: target/*.jar